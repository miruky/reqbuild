<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 250" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">reqbuildのアーキテクチャ</title>
  <desc id="arch-desc">curl文字列をparseCurlで中立モデルRequestSpecへ解析し、UIで編集したモデルから各言語のジェネレータがコードを生成する流れ。</desc>
  <style>
    text {
      font-family: 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
    }
    .box {
      fill: none;
      stroke: var(--rule);
      stroke-width: 1.4;
    }
    .accent {
      stroke: var(--accent);
      stroke-width: 1.6;
    }
    .lbl {
      font-size: 14px;
      font-weight: 600;
      fill: var(--fg);
    }
    .albl {
      font-size: 14px;
      font-weight: 700;
      fill: var(--accent-fg);
    }
    .sub {
      font-size: 11.5px;
      fill: var(--muted);
    }
    .flow {
      stroke: var(--rule-strong);
      stroke-width: 1.4;
      fill: none;
      marker-end: url(#arrow);
    }
    #arrow path {
      fill: var(--rule-strong);
    }
    :root {
      --fg: #21242c;
      --muted: #7a7f88;
      --rule: #c4bfb4;
      --rule-strong: #9b978e;
      --accent: #1d7a57;
      --accent-fg: #176046;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e8e9ee;
        --muted: #8a8f99;
        --rule: #3a3f49;
        --rule-strong: #565c67;
        --accent: #6ad3a3;
        --accent-fg: #8bdcb4;
      }
    }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" />
    </marker>
  </defs>

  <rect class="box" x="20" y="96" width="138" height="58" rx="9" />
  <text class="lbl" x="38" y="122">curl 文字列</text>
  <text class="sub" x="38" y="142">貼り付け入力</text>

  <rect class="box accent" x="206" y="96" width="128" height="58" rx="9" />
  <text class="albl" x="224" y="122">parseCurl</text>
  <text class="sub" x="224" y="142">字句解析</text>

  <rect class="box accent" x="382" y="92" width="160" height="66" rx="9" />
  <text class="albl" x="402" y="120">RequestSpec</text>
  <text class="sub" x="402" y="140">編集可能な中立モデル</text>

  <rect class="box" x="402" y="14" width="120" height="50" rx="9" />
  <text class="lbl" x="422" y="44">App (UI)</text>

  <rect class="box" x="590" y="92" width="146" height="66" rx="9" />
  <text class="lbl" x="610" y="120">GENERATORS</text>
  <text class="sub" x="610" y="140">モデルから生成</text>

  <rect class="box" x="784" y="40" width="76" height="170" rx="9" />
  <text class="sub" x="800" y="64">curl</text>
  <text class="sub" x="800" y="86">fetch</text>
  <text class="sub" x="800" y="108">Python</text>
  <text class="sub" x="800" y="130">Go</text>
  <text class="sub" x="800" y="152">Ruby</text>
  <text class="sub" x="800" y="174">PHP / HTTPie</text>
  <text class="sub" x="800" y="196">生 HTTP</text>

  <path class="flow" d="M158 125 H200" />
  <path class="flow" d="M334 125 H376" />
  <path class="flow" d="M542 125 H584" />
  <path class="flow" d="M736 125 C760 125 762 125 780 118" />
  <path class="flow" d="M462 64 V86" />
  <path class="flow" d="M482 92 V70" />
</svg>
