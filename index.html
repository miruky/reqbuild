<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="メソッド・URL・ヘッダー・ボディから curl・fetch・Python・Go・Ruby・PHP・HTTPie・生HTTPのコードを相互生成するブラウザツール。curlの貼り付け解析にも対応。"
    />
    <meta name="theme-color" content="#f3f1ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#14161c" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="reqbuild | HTTPリクエストビルダー" />
    <meta
      property="og:description"
      content="1つのリクエスト定義から curl・各言語クライアント・生HTTPを相互生成する。"
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <title>reqbuild | HTTPリクエストビルダー</title>
    <script>
      // 描画前にテーマを確定してチラつき(FOUC)を防ぐ
      (function () {
        try {
          var stored = localStorage.getItem('reqbuild.theme.v1');
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = stored === 'light' || stored === 'dark' ? stored : dark ? 'dark' : 'light';
          document.documentElement.dataset.theme = resolved;
        } catch (e) {
          /* localStorageが使えない環境では既定の配色にフォールバック */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
